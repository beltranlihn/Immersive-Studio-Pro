<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Immersive Studio Pro</title>
<style>
  /* self-hosted fonts (no Google Fonts CDN — the packaged .exe works fully offline) */
  /* Geist is the single UI family; Inter is kept only as a fallback + for user text-clip content */
  @font-face{font-family:'Geist';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/geist-400.woff2') format('woff2');}
  @font-face{font-family:'Geist';font-style:normal;font-weight:500;font-display:swap;src:url('assets/fonts/geist-500.woff2') format('woff2');}
  @font-face{font-family:'Geist';font-style:normal;font-weight:600;font-display:swap;src:url('assets/fonts/geist-600.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-style:normal;font-weight:400 600;font-display:swap;src:url('assets/fonts/inter-latin.woff2') format('woff2');}
</style>
<style>
  /* [U-04] design tokens — single source for the monochrome ramp (bg → surface → ink) */
  /* ===== [R102·D-T1] Sistema de diseño. Cada valor tiene fuente — ver PROPUESTA-DISENO-UI.md =====
     SUPERFICIES: 3, no 6. Medido: toda referencia (Ableton/Premiere/Blender/Unreal, capturadas a resolución
     nativa) tiene UNA superficie dominante con 30–54% del área; la nuestra mandaba solo en el 26% porque
     repartíamos en seis. M3 define 5 roles y no los usa adyacentes. Pasos de 4–5 L* (Spectrum envía ΔL* 2.8–4.9).
     NEUTRAS: las cuatro referencias envían grises neutros; nuestro tinte azul sesga el juicio de color, que es
     justo lo que esta herramienta existe para hacer.
     NO las aclaramos a #121212 (regla de Material): medido, Premiere —el análogo correcto, es vídeo— está en
     L*=10.8 y nosotros en 8.2. Un entorno oscuro alrededor del visor está justificado. Ableton (22.6) y
     Blender (26.7) son más claros porque no juzgan imagen.
     La DIRECCIÓN del contraste es la affordance (Blender): botón = s2 (más claro que el panel);
     campo editable = s0 (más oscuro). Sin bordes, sin iconos. */
  :root{
    --s0:#111111;  /* L* 5.1  — pozos: fondo de app, campo de timeline, inputs editables */
    --s1:#1B1B1B;  /* L* 9.8  — paneles: LA superficie dominante (Premiere: 10.8) */
    --s2:#262626;  /* L* 15.2 — elevado: botones, chips, cabeceras */
    /* TINTAS. WCAG miente en oscuro: var(--ink-2) pasaba AA (4.22) con APCA Lc −38 = "aviso de copyright".
       Objetivo real: ≥7:1 y |Lc|≥60 (M3 apunta a 7:1 —AAA— para texto primario en oscuro). */
    --ink:#E0E0E0;      /* primario    Lc −85..−87 */
    --ink-2:#B8B8B8;    /* secundario  Lc −61..−64 */
    --ink-3:#8C8C8C;    /* NO es texto de cuerpo: Lc −38. Solo marcas de regla, sufijos de unidad */
    --ink-dim:#6D6D6D;  /* deshabilitado Lc −23..−26 */
    /* LÍNEAS: 3 alfas, no 10. Nadie distingue 0.08 de 0.09. M3: separador decorativo objetivo 1:1;
       borde con significado 3:1. */
    --line-soft:rgba(255,255,255,0.05);   /* divisor decorativo */
    --line:rgba(255,255,255,0.10);        /* borde con significado */
    --line-strong:rgba(255,255,255,0.16); /* foco / selección */
    /* ACENTOS: presupuesto = 2, y está escrito. Live se diseñó a dos colores; el tercero "muddies the
       waters". Eric Carl (Principal Designer, Ableton) lo defendió y PERDIÓ internamente — la disciplina
       solo aguanta si es una regla, no un gusto. Añadir un tercero exige cambiar este comentario. */
    --auto-live:#4FC3E8;  /* cian  = vivo / arrastrable */
    --auto-ovr:#E5B567;   /* ámbar = anulado */
    --danger:#D98A8A;
    /* ESTADO. Un toggle encendido NO es una superficie más: es estado, así que no cuenta contra el tope de 3.
       Resolve lo dice dos veces en su manual ("Light gray when turned on, dark gray when turned off"):
       el encendido se lee por VALOR, no por color — la saturación se reserva para significado. */
    --state-on:#4A4A4A;    /* L* 30.7 — claramente por encima de s2 (15.2): "encendido" inconfundible */
    --state-hover:#303030; /* L* 19.9 — ΔL* 4.7 sobre s2. Blender: "strong mouse hover highlights can be very
                              flashy and cause distracting visual noise" → perceptible, nunca estroboscópico.
                              Tampoco cuenta contra el tope de 3: es estado, no nivel. */
    /* ESPACIADO: paleta CERRADA = intersección exacta de Spectrum + Primer + Atlassian. 2 y 6 son legales
       (los tres los envían como tokens con nombre). No hay escotilla: si un valor no está aquí, no existe. */
    --sp-2:2px; --sp-4:4px; --sp-6:6px; --sp-8:8px; --sp-12:12px; --sp-16:16px; --sp-20:20px; --sp-24:24px; --sp-32:32px;
    /* Alias heredados → colapsan los 6 grises viejos sobre las 3 superficies reales.
       Mapeados por lo que CADA UNO hace realmente, no por su nombre:
         bg-0 (badges, .track, inputs) y bg-1 (.app, .mid) = pozos          → s0
         bg-2 (.mtile, .ruler, .zoomgrp) y surface (.top, .vptool) = paneles → s1
         surface-2 (.seg, .ibtn) = botones                                   → s2
         surface-3 = SOLO hover → state-hover (colapsarlo a s2 dejaba el hover invisible: mismo color
                     que el botón en reposo. Lo cazó la aserción "hover != reposo"). */
    --bg-0:var(--s0); --bg-1:var(--s0); --bg-2:var(--s1);
    --surface:var(--s1); --surface-2:var(--s2); --surface-3:var(--state-hover);
    --ink-faint:var(--ink-2); /* LEVANTADO: 26 usos que eran texto real a Lc −38 */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Geist','Inter',-apple-system,system-ui,sans-serif;background:var(--bg-1);color:var(--ink);
    -webkit-font-smoothing:antialiased;font-size:11px;letter-spacing:-0.003em;overflow:hidden;user-select:none;}
  .tnum{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;} /* [U-39] ex .mono — it never was monospaced, it's Geist + tabular numerals */
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-corner{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:2px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.22);}
  /* slim monochrome range sliders (FOV / dolly / volume / etc.) — match the .prow fader look */
  input[type=range]{-webkit-appearance:none;appearance:none;height:12px;background:transparent;cursor:pointer;}
  input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:var(--bg-0);box-shadow:inset 0 1px 2px rgba(0,0,0,0.55);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ink);border:none;margin-top:-4px;box-shadow:0 1px 2px rgba(0,0,0,0.5);}
  input[type=range]:hover::-webkit-slider-thumb{background:#FFFFFF;}
  button{font-family:inherit;color:inherit;padding:0;}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:1.5px solid var(--ink-2);outline-offset:1px;}
  [tabindex]:focus-visible{outline:1px solid var(--ink-2);outline-offset:-1px;} /* [R94-UT5·U-10b] inset ring for keyboard-focused clips / track headers */
  button:disabled{opacity:.4;cursor:not-allowed;} /* [R94-UT5·U-30] real disabled buttons look disabled everywhere (matches .dis) */
  @keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.99);}to{opacity:1;transform:none;}}
  @keyframes overIn{from{opacity:0;}to{opacity:1;}}

  .app{display:flex;flex-direction:column;height:100vh;width:100vw;background:var(--bg-1);}
  /* top bar */
  .top{height:28px;flex-shrink:0;display:flex;align-items:center;gap:var(--sp-8);padding:0 10px;background:var(--surface);border-bottom:.5px solid rgba(255,255,255,0.09);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--ink-2);flex-shrink:0;}
  /* [U-18] segmented controls — ONE canonical look (surface-2 · border rgba .1 · radius 2). Variant rules below keep ONLY real size/padding differences. */
  .seg,.vseg,.filtseg,.editseg,.groupseg,.seg2{background:var(--surface-2);border:.5px solid rgba(255,255,255,0.1);border-radius:2px;}
  .seg,.vseg,.filtseg,.editseg,.groupseg{display:inline-flex;align-items:stretch;height:18px;overflow:hidden;}
  .seg button,.vseg button,.filtseg button,.editseg button,.groupseg button{display:inline-flex;align-items:center;gap:var(--sp-6);padding:0 9px;font-size:11px;font-weight:500;border:none;background:transparent;color:var(--ink-2);cursor:pointer;transition:background .12s,color .12s;}
  .seg button+button,.vseg button+button,.filtseg button+button,.editseg button+button,.groupseg button+button{border-left:.5px solid rgba(255,255,255,0.1);}
  .seg button:hover,.vseg button:hover,.filtseg button:hover,.editseg button:hover,.groupseg button:hover{background:var(--surface-3);}
  .seg button.on,.vseg button.on,.filtseg button.on,.editseg button.on,.groupseg button.on,.seg2 button.on,.kindseg button.on{background:var(--state-on);color:var(--ink);}
  .chip{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;}

  /* body wrappers: default = stagecol fills; tall-inspector mode moves #inspPane beside stagecol so it spans full height */
  .bodyrow{flex:1;min-height:0;display:flex;}
  .stagecol{flex:1;min-width:0;display:flex;flex-direction:column;}
  .mid{flex:1;min-height:0;display:flex;background:var(--bg-1);}
  aside{display:flex;flex-direction:column;background:var(--bg-2);}
  .panhead{height:26px;flex-shrink:0;display:flex;align-items:center;gap:6px;padding:0 8px;background:var(--s0);border-bottom:.5px solid rgba(0,0,0,0.45);}
  .pantab{display:flex;align-items:center;gap:6px;height:18px;padding:0 6px;background:transparent;border:none;border-radius:2px;}
  .pantab .ttl{font-size:11px;font-weight:600;letter-spacing:-0.008em;color:var(--ink-2);}
  .countbadge{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;font-weight:500;color:var(--ink-faint);background:var(--bg-0);padding:1px 5px;border-radius:2px;}
  .ibtn{width:22px;height:22px;display:grid;place-items:center;border-radius:2px;border:.5px solid rgba(255,255,255,0.09);background:var(--surface-2);color:var(--ink-2);cursor:pointer;transition:background .14s,transform .1s;} /* [U-20] 22² hit target (same icon, more inner padding) */
  .ibtn:hover{background:var(--surface-3);} .ibtn:active{transform:scale(.9);}
  .ibtn.flat{border:none;background:transparent;color:var(--ink-2);} .ibtn.flat:hover{color:var(--ink);} .ibtn.flat.on{color:var(--ink);}
  .gutter{width:5px;flex-shrink:0;cursor:col-resize;background:transparent;margin:0 -2.5px;z-index:8;}
  .gutter:hover{background:rgba(255,255,255,0.18);}

  /* media */
  .toolrow{display:flex;align-items:center;gap:var(--sp-8);flex-shrink:0;border-bottom:.5px solid rgba(255,255,255,0.05);}
  /* [R102·D-T1] 20px, no 18: es la altura de control de Blender ("Widget unit is 20 pixels at 1X scale") y a
     11px el texto necesita 15px de interlineado — a 18 se recortaba. El fondo s0 (más oscuro que el panel) ES
     la affordance de "esto se edita"; el botón hace lo contrario y va a s2. */
  .searchbox{flex:1;min-width:0;display:flex;align-items:center;gap:var(--sp-6);height:20px;padding:0 var(--sp-8);border-radius:2px;background:var(--s0);border:.5px solid var(--line-soft);box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);}
  .searchbox input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:11px;}
  .filtseg{flex-shrink:0;} /* [U-18] look shared with .seg */
  .filtseg button{padding:0 7px;display:grid;place-items:center;}
  .medialist{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:5px 6px 12px;}
  .grphead{display:flex;align-items:center;gap:6px;height:24px;padding:0 8px;border-radius:2px;cursor:default;color:var(--ink-2);}
  .grphead:hover{background:rgba(255,255,255,0.04);}
  .mitem{display:flex;align-items:center;gap:var(--sp-8);padding:5px 7px;margin-bottom:1px;border-radius:2px;cursor:grab;transition:background .12s;}
  .mitem:hover{background:rgba(255,255,255,0.04);}
  .mitem.sel{background:rgba(201,205,211,0.14);box-shadow:inset 0 0 0 1px rgba(201,205,211,0.55);}
  /* [R102·D-T2] SELECCIÓN EN DOS NIVELES. El tema de Ableton envía `Selection` y `StandbySelection` como
     colores DISTINTOS (fondo y primer plano), y repite el patrón para los resultados de búsqueda. Motivo:
     con tres paneles compitiendo por el foco (medios · línea de tiempo · inspector), si "seleccionado aquí" y
     "seleccionado allí" se ven igual, el usuario no sabe sobre qué van a actuar el teclado o el próximo comando.
     Nosotros lo colapsábamos en uno solo.
     Base = STANDBY (atenuado). El panel con foco recupera la intensidad vía body.fp-*. */
  .mtile.sel{border-color:var(--ink-3);box-shadow:0 0 0 1px var(--ink-3);}
  body.fp-media .mtile.sel{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink);}
  /* media grid (square tiles) + folder navigation */
  .mediagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;padding:7px;align-content:start;border:1px solid transparent;border-radius:4px;}
  .mediagrid.dragover{border-color:rgba(201,205,211,0.5);background:rgba(201,205,211,0.06);}
  .mtile.folderhdr.dragover,.mtile.backtile.dragover{border-color:var(--ink-2);box-shadow:0 0 0 2px rgba(201,205,211,0.35);}
  .mtile{position:relative;border-radius:3px;overflow:hidden;cursor:grab;background:var(--bg-2);border:.5px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;transition:border-color .12s;}
  .mtile:hover{border-color:rgba(201,205,211,0.45);}
  .mtile.missing{box-shadow:inset 0 0 0 1px #E06A6A;} /* [M4] missing original → red */
  .mtile .tthumb{aspect-ratio:1;background-size:cover;background-position:center;background-color:var(--bg-1);position:relative;}
  .mtile .tthumb.mseq{outline:1.5px solid var(--state-on);outline-offset:-1.5px;}
  .mtile .tdur{position:absolute;right:2px;bottom:2px;font:9px Geist;background:rgba(0,0,0,0.62);color:var(--ink-2);padding:0 3px;border-radius:2px;}
  .mtile .tprox{position:absolute;left:2px;top:2px;font-size:11px;}
  .mtile .tpbar{position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(0,0,0,0.5);} .mtile .tpbar>i{display:block;height:100%;background:var(--ink-2);}
  .mtile .tlbl{font-size:11px;line-height:1.25;color:var(--ink-2);padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mtile.foldertile,.mtile.backtile{cursor:pointer;background:var(--surface);}
  .mthumb{width:50px;height:30px;flex-shrink:0;border-radius:2px;background-size:cover;background-position:center;border:.5px solid rgba(255,255,255,0.09);position:relative;overflow:hidden;background-color:var(--surface-2);}
  .mthumb .dur{position:absolute;bottom:2px;right:3px;font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--ink);background:rgba(0,0,0,0.55);padding:0 3px;border-radius:2px;}
  .mthumb .pbar{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(0,0,0,0.4);}
  .mthumb .pbar>i{display:block;height:100%;width:0;background:var(--ink-2);}
  /* [R109] proxy generating: taller cyan bar + centred % so a long encode reads unmistakably as "working, N%" */
  .mthumb .pbar.gen{height:14px;background:rgba(6,7,9,0.74);}
  .mthumb .pbar.gen>i{background:var(--auto-live);transition:width .2s linear;}
  .mthumb .pbar .pbtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:600 9px Geist,system-ui,sans-serif;color:var(--ink);letter-spacing:.03em;pointer-events:none;}
  .mname{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mmeta{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.06em;}
  .mdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .drop{margin:8px;border:1px dashed rgba(255,255,255,0.12);border-radius:2px;padding:18px 10px;text-align:center;color:var(--ink-faint);cursor:pointer;font-size:11px;line-height:1.6;}
  .drop:hover{border-color:var(--ink-2);color:var(--ink-2);} .drop b{color:var(--ink-2);}

  /* viewport */
  main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg-1);position:relative;overflow:hidden;}
  .vptool{height:28px;flex-shrink:0;display:flex;align-items:center;gap:var(--sp-8);padding:0 8px;background:var(--surface);border-bottom:.5px solid rgba(0,0,0,0.35);overflow:hidden;}
  .vseg button{height:100%;white-space:nowrap;} /* [U-18] look shared with .seg */
  .vdiv{width:.5px;height:16px;background:rgba(255,255,255,0.08);flex-shrink:0;}
  .vslab{display:inline-flex;align-items:center;gap:6px;height:18px;padding:0 7px;border-radius:2px;background:var(--surface-2);border-top:.5px solid rgba(255,255,255,0.05);border-bottom:.5px solid rgba(0,0,0,0.3);}
  .vslab .k{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;letter-spacing:0.08em;color:var(--ink-faint);}
  .vslab .v{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--ink);}
  .stage{flex:1;min-height:0;position:relative;overflow:hidden;background:#000;}
  /* [V2] Full Performance: the viewer takes over the whole window; everything else stays in the DOM, just covered */
  body.perfmode #stage{position:fixed !important;inset:0 !important;z-index:1000 !important;}
  .perfexit{display:none;position:absolute;top:12px;right:14px;z-index:1001;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:4px;background:rgba(18,20,24,0.70);color:var(--ink-2);font-size:11px;cursor:pointer;border:.5px solid rgba(255,255,255,0.16);}
  .perfexit:hover{color:var(--ink);background:rgba(28,31,36,0.85);}
  body.perfmode #perfExit{display:flex;}
  body.perfmode #perfExit:not(:hover){opacity:0.25;transition:opacity .2s;}
  /* [F8] alpha-reference checkerboard behind the (transparent) GL canvas */
  .checkerbg{position:absolute;inset:0;z-index:0;display:none;background-color:#ffffff;background-image:linear-gradient(45deg,#bfbfbf 25%,transparent 25%,transparent 75%,#bfbfbf 75%),linear-gradient(45deg,#bfbfbf 25%,transparent 25%,transparent 75%,#bfbfbf 75%);background-size:26px 26px;background-position:0 0,13px 13px;}
  .checkerbg.on{display:block;}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  /* [R2] while exporting, glc is resized to the export resolution → the on-screen canvas would show a stretched
     stale frame. This opaque mask hides that; the export still reads from #gl underneath. */
  .rendermask{position:absolute;inset:0;z-index:6;display:none;align-items:center;justify-content:center;background:var(--s0);}
  .rendermask.on{display:flex;}
  .rendermask .rmlabel{display:flex;align-items:center;gap:9px;color:var(--ink-2);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;}
  .rendermask .rmdot{width:8px;height:8px;border-radius:50%;background:var(--auto-live);animation:rmpulse 1s ease-in-out infinite;}
  @keyframes rmpulse{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1);}}
  #grid{pointer-events:auto;}

  /* inspector */
  .insbody{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;}
  .selhead{display:flex;align-items:center;gap:var(--sp-12);padding:11px 12px 10px;}
  .selthumb{width:44px;height:29px;border-radius:2px;background-size:cover;background-position:center;border:.5px solid rgba(255,255,255,0.14);background-color:var(--surface-2);}
  .selname{font-size:13px;font-weight:600;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
  .selmeta{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;letter-spacing:0.02em;color:var(--ink-2);margin-top:2px;text-transform:uppercase;} /* [R92-T5] informational text lifted to ~4.5:1 (long dark-room sessions) */
  .sechead{width:100%;display:flex;align-items:center;gap:6px;height:20px;padding:0 12px;border:none;background:transparent;cursor:pointer;}
  .fxhdr .fxtog,.fxhdr .fxcol,.fxhdr .fxdel{background:none;border:none;} .fxhdr .fxtog:hover,.fxhdr .fxcol:hover,.fxhdr .fxdel:hover{background:var(--surface-3);} .fxhdr .fxdel:hover{color:var(--ink-2) !important;}
  .aselect{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%239EA5AD' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 4px center;padding-right:15px;}
  .sechead .t{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-2);}
  .sechead .ln{flex:1;height:.5px;background:rgba(255,255,255,0.09);}

  /* [R95·E4] STACKED, like Ableton: device over parameter. Side by side in a 152px header each select got ~55px and
     truncated to "Tra∨ ◆S∨"; stacked they get the full width and read in full. Same geometry as the text variant. */
  .autoduo{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;align-items:stretch;justify-content:center;overflow:hidden;}
  .autoduo .aselect{width:100%;height:16px;font-size:11px;}
  .autoduo .adev{color:var(--ink-faint);}
  /* [R95·E4] unfocused lanes show device/parameter as 2-line text instead of two truncated dropdowns ("Tra∨ ◆S∨") */
  .autoduo.txt{flex-direction:column;align-items:flex-start;justify-content:center;gap:0;cursor:pointer;line-height:1.25;overflow:hidden;}
  .autoduo.txt .adev-t{font-size:11px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .autoduo.txt .apar-t{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .autoduo.txt:hover .apar-t{color:var(--ink);}
  /* [R95·E1] the parameter's hue as a 3px side bar — the visual tie between a header and its curve (costs no width) */
  .autohdr,.lanehdr .autoctl{position:relative;}
  .autohdr::before,.lanehdr .autoctl::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:2px;background:var(--pc,transparent);}
  .autohdr{padding-left:9px;} .lanehdr .autoctl{padding-left:7px;}
  .autoduo .aselect{flex:1;min-width:0;height:18px;font-size:11px;color:var(--ink-2);background-color:var(--surface-2);border:.5px solid rgba(255,255,255,0.1);border-radius:2px;padding:0 13px 0 4px;cursor:pointer;}
  .autoduo .adev{flex:0.8;}.autoduo .apar{flex:1.2;} /* [R94-UT2·U-15] the parameter name is the longer of the pair — give it the room */
  .lanehdr .autoctl{position:absolute;left:20px;right:6px;bottom:3px;display:flex;gap:4px;align-items:center;z-index:4;}
  .lanehdr .autoctl .asw{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .lanehdr .autoctl .abt{width:18px;height:18px;flex-shrink:0;display:grid;place-items:center;border:.5px solid rgba(255,255,255,0.1);border-radius:2px;background:var(--surface-2);color:var(--ink-faint);cursor:pointer;font-size:11px;line-height:1;padding:0;}
  .lanehdr .autoctl .abt:hover{color:var(--ink);background:var(--surface-3);}
  .lanehdr .autoctl .abt.on{color:var(--ink);border-color:rgba(201,205,211,0.5);}
  .lanehdr .autoctl .abt.areen{display:none;color:var(--ink-2);border-color:rgba(201,205,211,0.5);} .lanehdr .autoctl .abt.areen.show{display:grid;}
  /* [R102·D-T2] Polaridad INVERTIDA respecto al campo de la timeline. Blender envía el editor de curvas sobre
     `#303030` con rejilla `#1a1a1a`, invirtiendo su secuenciador (`#181818` con rejilla `#303030`): una curva
     fina y brillante necesita suelo elevado y de bajo contraste; un clip macizo necesita pozo.
     Nuestra timeline es s0 → la banda de automatización sube a s1, y su rejilla pasa a ser más oscura. */
  .autolane{position:relative;border-bottom:.5px solid var(--line-soft);background:var(--s1);}
  .autolane .autocv{position:absolute;left:0;top:0;display:block;pointer-events:auto;cursor:crosshair;}
  .autohdr{position:relative;display:flex;align-items:center;gap:6px;padding:0 7px 0 22px;border-bottom:.5px solid rgba(255,255,255,0.05);background:var(--s0);}
  .autohdr .autores{position:absolute;left:0;right:0;bottom:0;height:5px;cursor:ns-resize;background:transparent;}
  .autohdr .autores:hover{background:rgba(255,255,255,0.25);}
  .autohdr .asw{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .autohdr .alab{flex:1;font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .autohdr .aselect{flex:1;min-width:0;height:18px;font-size:11px;color:var(--ink-2);background-color:var(--surface-2);border:.5px solid rgba(255,255,255,0.1);border-radius:2px;padding:0 15px 0 4px;cursor:pointer;}
  .autohdr .abt{width:18px;height:18px;flex-shrink:0;display:grid;place-items:center;border:.5px solid rgba(255,255,255,0.1);border-radius:2px;background:var(--surface-2);color:var(--ink-faint);cursor:pointer;font-size:11px;line-height:1;padding:0;}
  .autohdr .abt:hover{color:var(--ink);background:var(--surface-3);}
  .autohdr .abt.on{color:var(--ink);border-color:rgba(201,205,211,0.5);}
  .autohdr .abt.areen{display:none;color:var(--ink-2);border-color:rgba(201,205,211,0.5);} .autohdr .abt.areen.show{display:grid;}
  .lanehdr .autoctl .abt.ovr,.autohdr .abt.ovr{color:#E5B567;border-color:rgba(229,181,103,0.55);} /* [R94-UT2·U-16] amber = automation overridden (Ableton-style), vs white "on" = following the curve */
  .tlscroll{flex:1;overflow:auto;position:relative;}
  .ruler{height:22px;position:sticky;top:0;background:var(--bg-2);border-bottom:.5px solid rgba(0,0,0,0.4);z-index:4;}
  .ruler canvas{display:block;}
  #clipExtent{position:absolute;bottom:0;height:3px;background:var(--ink-3);opacity:.75;border-radius:1px;pointer-events:none;z-index:5;display:none;} /* [R94d] Premiere-style bar spanning the clip extent of the sequence */
  .tracks{position:relative;display:flex;flex-direction:column;min-height:calc(100% - 22px);} /* [L2] fill the viewport (minus the 22px ruler) so the audio module (margin-top:auto) pins to the BOTTOM even with few video tracks; the explicit width (set in JS) keeps horizontal scroll intact */
  /* [R102·D-T2] Filas alternas al 2% de blanco. Blender envía `row_alternate = #ffffff05` (~2%): la mayoría
     usa 10–15% y eso zumba sobre 30 pistas. Alfa, no un gris: sobrevive a un cambio de tema. */
  .lane{border-bottom:.5px solid var(--line-soft);position:relative;}
  .lane:nth-child(even){background:rgba(255,255,255,0.02);}
  /* [R92-T8/T9] video↔audio divider (Premiere-style double line) — also the audio-module resize grip */
  .trackdivider{height:18px;flex-shrink:0;background:var(--bg-0);border-top:1px solid rgba(255,255,255,0.14);border-bottom:1px solid rgba(255,255,255,0.14);box-shadow:inset 0 0 0 100px rgba(0,0,0,0.35);} /* [R110] taller so the AUDIO/VIDEO group labels sit comfortably */
  .trackdivider.resizable{cursor:row-resize;} .trackdivider.resizable:hover{background:var(--s0);border-top-color:rgba(201,205,211,0.55);border-bottom-color:rgba(201,205,211,0.55);}
  .trackdivider.collapsible{cursor:pointer;} .trackdivider.collapsible:hover{background:var(--s0);border-top-color:rgba(201,205,211,0.45);border-bottom-color:rgba(201,205,211,0.45);} /* [R110] the AUDIO bar toggles the module collapse */
  .trackdivider.hdr{display:flex;align-items:center;gap:5px;padding:0 10px;}
  .trackdivider.hdr .dvlab,.rulerpad .dvlab{font-family:'Geist',system-ui,sans-serif;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);} /* [U1] VIDEO (ruler-pad) matches the AUDIO bar label style */
  .trackdivider.hdr .dvchev{font-size:9px;color:var(--ink-3);line-height:1;}
  .lanehdr.aud .laneres,.lanehdr.aud .lcol{display:none;} /* [R110] audio tracks: fixed height → no per-lane resize / collapse */
  /* [R92-T9] pinned audio module — video tracks scroll behind it (Premiere) */
  .audiozone{position:sticky;bottom:0;z-index:4;margin-top:auto;background:var(--bg-1);overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;scrollbar-width:none;} /* [R93b] fixed-height module: extra audio tracks scroll INSIDE (wheel); no visible scrollbar · [L2] margin-top:auto pins it to the bottom when there's free space, sticky handles the overflow case */
  .audiozone::-webkit-scrollbar{display:none;}
  .audiozone.covers{box-shadow:0 -8px 12px -6px rgba(0,0,0,0.55);} /* [R94-UT2·U-01] top shadow = video rows are hidden behind the pinned module */
  .audiozone.hdr{background:var(--surface);z-index:6;}
  .audiozone .trackdivider{position:sticky;top:0;z-index:7;} /* the divider (resize grip) stays pinned at the top of the module while its content scrolls */
  .clip{position:absolute;top:4px;border-radius:2px;overflow:hidden;cursor:default;background:transparent;border:1px solid rgba(255,255,255,0.10);}
  .clip .fill{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.42;}
  .clip .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.05),rgba(0,0,0,0.22));}
  .clip .cthumb{position:absolute;left:0;top:15px;bottom:0;background-size:cover;background-position:center;border-right:1px solid rgba(0,0,0,0.45);pointer-events:none;z-index:1;} /* [R94b] Premiere-style head thumbnail, fixed at the clip's left edge */
  body.automode .clip .cthumb{display:none;} /* automation mode: the clip body is the envelope canvas — no thumbnail */
  .lane.collapsed .clip .cthumb{display:none;}
  .clip .tt{position:absolute;left:0;right:0;top:0;height:15px;line-height:15px;padding:0 7px;font-size:11px;font-weight:600;color:var(--ink);text-shadow:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--s2);border-bottom:.5px solid rgba(0,0,0,0.25);cursor:grab;pointer-events:auto;z-index:2;}
  /* [R102·D-T2] Base = standby (foco en otro panel). body.fp-timeline la sube a selección plena. */
  .clip .tt:active{cursor:grabbing;} .clip.sel .tt{box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.30);}
  body.fp-timeline .clip.sel .tt{box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.85);}
  /* [R102·D-T2] Clip deshabilitado: atenuado Y con trama. El color nunca puede ser el único portador del
     estado — la trama es forma, se lee en escala de grises y con cualquier daltonismo. */
  .clip.offline{border-color:#E06A6A;box-shadow:inset 0 0 0 1px rgba(224,106,106,0.55);} /* [M4] clip whose media was deleted/is missing */
  .clip.off{opacity:.42;filter:saturate(0.25);}
  .clip.off::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:3;border-radius:2px;
    background:repeating-linear-gradient(45deg,transparent 0 4px,rgba(0,0,0,0.5) 4px 8px);}
  /* [R94-UT2·U-09] automation mode: the clip body is the envelope canvas — highlight the title band as the ONLY grab zone */
  body.automode .clip .tt{cursor:grab;box-shadow:inset 0 -1px 0 rgba(255,255,255,0.28);}
  /* [R95·E3] with automation on, the material steps back so the envelope is the subject (Ableton dims the waveform) */
  body.automode .clip .fill{opacity:.35;} body.automode .clip .cthumb{opacity:.3;} body.automode .clip .scrim{opacity:.5;}
  /* [R94c] Simple clip view (Premiere): the whole block grabs — the title band stops being the only handle */
  body.simpleclips .clip{cursor:grab;} body.simpleclips .clip:active{cursor:grabbing;}
  body.simpleclips .clip .tt{box-shadow:none;}
  body.automode .clip .tt:active{cursor:grabbing;}
  body.automode .clip.sel .tt{box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.7),inset 0 -1px 0 rgba(255,255,255,0.28);}
  .clip .cpx{position:absolute;left:7px;bottom:3px;font-size:11px;font-weight:600;letter-spacing:0.06em;color:var(--ink-2);text-shadow:0 1px 2px #000;white-space:nowrap;pointer-events:none;opacity:.92;}
  .clip .cpxbar{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(0,0,0,0.45);pointer-events:none;}
  .clip .cpxbar>i{display:block;height:100%;background:var(--ink-2);}
  /* [R102·D-T2] ESTA es la señal de selección que siempre se ve: el borde del clip entero. (El contorno del
     título de arriba no vale como señal única — `body.simpleclips` lo anula a propósito, porque en modo simple
     el título deja de ser el asa, y el modo simple es el de por defecto.)
     Base = STANDBY: seleccionado, pero el foco está en otro panel. body.fp-timeline lo sube a selección plena. */
  .clip.sel{border:1.5px solid var(--ink-3);box-shadow:0 0 0 1px var(--ink-3);}
  body.fp-timeline .clip.sel{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink);}
  .clip .hd{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:2;}
  .clip .hd.l{left:0;} .clip .hd.r{right:0;}
  .clip .hd:hover{background:rgba(201,205,211,0.25);}
  /* [R132] Ableton automation view: in automation mode the clip resizes ONLY from the top strip (top-left/right corners, aligned with RES_TOP=15px). The rest of the L/R edges is freed so envelope breakpoints can be placed right up to the clip boundary. */
  body.automode .clip .hd{bottom:auto;height:15px;}
  body.automode .clip .hd:hover{background:rgba(201,205,211,0.38);}
  .clip .fadeh{position:absolute;top:0;width:11px;height:11px;z-index:4;cursor:ew-resize;}
  .clip .fadeh::after{content:'';position:absolute;top:2px;width:7px;height:7px;border-radius:50%;background:var(--ink);border:1px solid var(--bg-1);box-shadow:0 1px 2px rgba(0,0,0,0.6);}
  .clip .fadeh.fadeL{transform:translateX(-50%);} .clip .fadeh.fadeL::after{left:1px;}
  .clip .fadeh.fadeR{transform:translateX(50%);} .clip .fadeh.fadeR::after{right:1px;}
  .clip .fadeh:hover::after{background:var(--ink-2);}
  .xfade{position:absolute;top:4px;bottom:4px;z-index:3;pointer-events:none;background-color:rgba(201,205,211,0.10);background-image:linear-gradient(to top right,transparent 48%,rgba(201,205,211,0.55) 50%,transparent 52%),linear-gradient(to bottom right,transparent 48%,rgba(201,205,211,0.55) 50%,transparent 52%);}
  .clip .fadeenv{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:visible;}
  .clip .fadeenv polyline{fill:none;stroke:var(--ink-2);stroke-width:1.4;vector-effect:non-scaling-stroke;opacity:.92;}
  .clip .kfstrip{position:absolute;left:0;right:0;bottom:0;height:9px;pointer-events:none;z-index:2;}
  .clip .kfd{position:absolute;bottom:1px;width:7px;height:7px;background:var(--ink-2);transform:translateX(-50%) rotate(45deg);border:.5px solid var(--bg-1);pointer-events:auto;cursor:pointer;}
  .clip .kfstrip.dim{opacity:.32;} .clip .kfstrip.dim .kfd{pointer-events:none;width:5px;height:5px;} /* [R92-T4] passive automation hint on unselected clips */
  .playhead{position:absolute;top:22px;width:2px;background:var(--ink);z-index:6;pointer-events:none;} /* [R94f] starts BELOW the ruler: the head is the top cap, the line no longer runs through it. Height set in renderTimeline = all tracks */
  /* [R94d] Premiere-style playhead head: a flat-topped shield (square shoulders + tapered tip) sitting in the ruler, not an arrow over the tracks */
  #phTri{position:absolute;top:12px;width:11px;height:10px;background:var(--ink);transform:translateX(-4.5px);pointer-events:none;z-index:6;clip-path:polygon(0 0,100% 0,100% 55%,50% 100%,0 55%);border-radius:1px 1px 0 0;} /* [R94f] −15%; its tip lands exactly where the ruler ends and the line begins */
  .snapline{position:absolute;top:0;width:1px;background:var(--ink);z-index:7;pointer-events:none;display:none;} /* crisp 1px line, no glow (R82: the blurred glow read as a stray thick line) — height set in renderTimeline = ruler + all tracks */
  .snapline.free{opacity:0.5;width:1px;} /* razor hover preview (not snapped) */
  /* timeline-header sequence tabs (Premiere-style) */
  .seqtabs{display:flex;gap:4px;align-items:center;padding:4px 8px;background:var(--s0);border-bottom:.5px solid rgba(0,0,0,0.45);overflow-x:auto;overflow-y:hidden;flex-shrink:0;scrollbar-width:thin;}
  .seqtabs::-webkit-scrollbar{height:6px;} .seqtabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
  /* [R105] height:20px explícito → todas las pestañas Y el botón "+" quedan a 20 (la altura de control de
     Blender y de la escala {16,18,20,22,24}). Antes el "+" salía a 21 por su font-weight:700: 1px más alto que
     las pestañas hermanas — el accidente que anoté en R102·D-T3. */
  .seqtab{display:inline-flex;align-items:center;height:20px;font-size:11px;padding:0 7px 0 9px;border-radius:2px;background:var(--surface);border:.5px solid rgba(255,255,255,0.1);color:var(--ink-2);cursor:pointer;white-space:nowrap;flex-shrink:0;box-sizing:border-box;}
  .seqtab .seqlab{max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  .seqtab.on{background:var(--state-on);color:var(--ink);border-color:var(--ink-2);}
  .seqtab .seqx{margin:-4px -5px -4px 3px;opacity:.45;font-size:11px;line-height:1;padding:6px;border-radius:2px;} /* [U-20] ≥18px clickable area via padding; negative margins keep the tab size */
  .seqtab .seqx:hover{opacity:1;color:var(--ink);background:rgba(255,255,255,0.15);}
  .seqtab.seqadd{color:var(--ink-2);font-weight:700;padding:0 9px;border-radius:2px;border-style:dashed;}
  .seqtab.seqadd:hover{color:var(--ink);border-color:var(--ink-2);}
  .mthumb.mseq{background:linear-gradient(135deg,var(--s2),var(--s1));display:flex;align-items:center;justify-content:center;}
  .cmini{display:flex;flex-direction:column;gap:var(--sp-4);flex:1;min-width:58px;font-size:11px;color:var(--ink-2);}
  .cmini input{height:20px;background:var(--surface-2);border:.5px solid rgba(255,255,255,0.12);border-radius:2px;color:var(--ink);text-align:center;font-size:11px;font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;}
  #cPrev,#icPrev{background:var(--s0);border:.5px solid rgba(255,255,255,0.12);}
  .cmedialist{flex:1;min-width:0;max-height:84px;overflow-y:auto;background:var(--s0);border:.5px solid rgba(255,255,255,0.12);border-radius:2px;padding:3px;display:flex;flex-direction:column;gap:var(--sp-2);}
  .cmedialist::-webkit-scrollbar{width:7px;} .cmedialist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:2px;}
  .cmediaitem{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:2px;cursor:pointer;font-size:11px;color:var(--ink-2);min-width:0;}
  .cmediaitem:hover{background:rgba(255,255,255,0.05);}
  .cmediaitem input{flex-shrink:0;margin:0;} .cmediaitem .mdot{width:8px;height:8px;border-radius:50%;}
  .cmediaitem .cmname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}

  /* status bar */
  .status{height:24px;flex-shrink:0;display:flex;align-items:center;gap:var(--sp-16);padding:0 12px;background:var(--s0);border-top:.5px solid rgba(0,0,0,0.4);font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--ink-2);letter-spacing:0.04em;}
  .status .ok{color:var(--ink-2);}

  /* modals */
  .overlay{position:fixed;inset:0;background:rgba(6,7,9,0.66);display:flex;align-items:center;justify-content:center;z-index:50;animation:overIn .12s;}
  /* [R134] branded square splash — the 1080×1080 logo loop shown a couple of seconds on startup + project open (responsive, capped at the native 1080²) */
  .splashcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:transparent;}
  .splashcard .splashlogo{width:min(1080px,82vmin);height:min(1080px,82vmin);object-fit:contain;border-radius:min(64px,6vmin);}
  .splashcard .splashttl{font-size:13px;color:var(--ink-3);letter-spacing:0.02em;text-align:center;padding:0 14px;}
  /* [R135] app menu bar (File / Edit / Window) */
  .menubar{display:flex;gap:1px;margin-left:2px;}
  .menubtn{height:20px;padding:0 9px;font-size:12px;font-weight:500;background:transparent;border:none;border-radius:3px;color:var(--ink-2);cursor:pointer;white-space:nowrap;}
  .menubtn:hover,.menubtn.on{background:var(--surface-2);color:var(--ink);}
  .modal{background:var(--bg-2);border:.5px solid rgba(255,255,255,0.12);border-radius:2px;box-shadow:0 24px 70px rgba(0,0,0,0.6);animation:modalIn .14s;width:520px;max-width:92vw;}
  .modal .mh{display:flex;align-items:center;gap:var(--sp-8);padding:14px 16px;border-bottom:.5px solid rgba(255,255,255,0.08);}
  .modal .mh .t{font-size:13px;font-weight:600;letter-spacing:-0.01em;}
  .modal .mb{padding:14px 16px;}
  .frow{display:flex;align-items:center;gap:var(--sp-12);margin-bottom:6px;}
  .frow label{width:90px;flex-shrink:0;font-size:11px;color:var(--ink-2);}
  .frow select,.frow input{flex:1;height:19px;padding:0 7px;border-radius:2px;border:.5px solid rgba(255,255,255,0.15);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:11px;}
  .frow .tnum{font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;}
  input[type=number]{cursor:ew-resize;} input[type=number]:focus{cursor:text;} /* [R72] drag horizontally to scrub the value; click to type */
  .frow label.chk{font-size:11px !important;} /* inline checkbox labels follow the density guide */
  /* compact monochrome checkboxes inside any modal (native ones render oversized on Windows) */
  .modal input[type=checkbox]{appearance:none;-webkit-appearance:none;flex:0 0 13px;width:13px;height:13px;margin:0;border:.5px solid rgba(255,255,255,0.3);border-radius:2px;background:var(--surface-2);cursor:pointer;position:relative;} /* flex:0 0 13px overrides .frow input{flex:1} which otherwise stretches the box */
  .modal input[type=checkbox]:checked{background:var(--ink-2);border-color:var(--ink-2);}
  .modal input[type=checkbox]:checked::after{content:'';position:absolute;left:4px;top:1px;width:3px;height:6.5px;border:solid var(--bg-0);border-width:0 1.6px 1.6px 0;transform:rotate(45deg);}
  .mbtn{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 11px;font-size:11px;font-weight:500;border-radius:2px;border:.5px solid rgba(255,255,255,0.12);background:var(--surface-2);color:var(--ink-2);cursor:pointer;}
  .mbtn:hover{background:var(--surface-3);}
  .mbtn.pri{background:var(--ink);border-color:transparent;color:var(--bg-1);font-weight:600;} .mbtn.pri:hover{filter:brightness(1.08);}
  .queue{margin-top:6px;border-top:.5px solid rgba(255,255,255,0.08);padding-top:10px;}
  .qjob{display:flex;align-items:center;gap:var(--sp-12);padding:7px 0;font-size:11px;}
  .qbar{flex:1;height:6px;border-radius:2px;background:var(--bg-0);overflow:hidden;} .qbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--ink-2),var(--ink));}

  .menu{position:fixed;z-index:60;background:var(--surface);border:.5px solid rgba(255,255,255,0.13);border-radius:2px;box-shadow:0 12px 34px rgba(0,0,0,0.55);padding:4px;min-width:170px;}
  .menu button{display:flex;align-items:center;gap:var(--sp-8);width:100%;text-align:left;padding:6px 9px;font-size:11px;border:none;background:transparent;color:var(--ink-2);cursor:pointer;border-radius:2px;}
  .menu button:hover{background:var(--surface-3);} .menu button:focus-visible{background:var(--surface-3);} /* [R94-UT5·U-10a] arrow-key focus reads like hover (plus the global outline ring) */
  .menu .sep{height:.5px;background:rgba(255,255,255,0.08);margin:4px 2px;}
  .menu button.danger{color:var(--danger);}
  .menu button.danger:hover{color:var(--danger);} /* same hue, brighter — stays legible on the hover surface */
  .iosw{width:34px;height:18px;border-radius:9px;border:none;background:var(--surface-2);position:relative;cursor:pointer;transition:background .15s;}
  .iosw>i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--ink-2);transition:transform .15s,background .15s;}
  .iosw.on{background:var(--ink-2);} .iosw.on>i{transform:translateX(16px);background:var(--s1);} /* [U-41] on = light track + dark knob (reads at a glance) */
  .rm-on *,.rm-on *::before,.rm-on *::after{transition:none!important;animation:none!important;}
  .groupseg button{padding:0 7px;} /* [U-18] look shared with .seg */
  .ringbtn{display:inline-flex;align-items:center;gap:var(--sp-6);height:18px;padding:0 9px;font-size:11px;font-weight:500;white-space:nowrap;border-radius:2px;border:.5px solid rgba(255,255,255,0.14);background:var(--surface-2);color:var(--ink-2);cursor:pointer;}
  .ringbtn:hover{background:var(--state-on);color:var(--ink);}
  .grphead2{display:flex;align-items:center;gap:6px;height:24px;padding:0 6px;margin-top:4px;cursor:pointer;color:var(--ink-2);font-size:11px;font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:0.12em;text-transform:uppercase;}
  .folderhdr{text-transform:none;letter-spacing:0.02em;font-size:11px;border-radius:2px;border:.5px solid transparent;}
  .folderhdr .fnm{cursor:pointer;} .folderhdr .fdel{opacity:0;color:var(--ink-3);} .folderhdr:hover .fdel{opacity:1;} .folderhdr .fdel:hover{color:var(--ink);}
  .folderdrop{margin:2px 6px 4px;padding:9px 8px;border:1px dashed rgba(255,255,255,0.16);border-radius:3px;color:var(--ink-dim);font-size:11px;text-align:center;}
  .folderhdr.dragover,.folderdrop.dragover{border-color:var(--ink-2);background:rgba(201,205,211,0.12);color:var(--ink);}
  .folderhdr.fsel{background:rgba(201,205,211,0.10);border-color:rgba(201,205,211,0.35);color:var(--ink);} /* selected folder (tree view) — New Folder creates inside it */
  /* disabled state */
  .dis{opacity:.32 !important;pointer-events:none !important;}
  #ringBtn.dis,#adjLayerBtn.dis{pointer-events:auto !important;cursor:not-allowed;} /* [R94-UT3·U-12] keep hover so the explanatory title tooltip shows; clicks are guarded in JS */
  #exportBtn{position:relative;} .exbadge{position:absolute;top:1px;right:2px;width:14px;height:14px;border-radius:50%;background:var(--ink-2);color:var(--s0);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;pointer-events:none;} /* [R94-UT3·U-33] active+queued export jobs counter on the Export button */
  /* collapsible panel rails */
  .pane-collapsed{width:34px !important;min-width:34px !important;flex:0 0 34px !important;}
  .pane-collapsed>*{display:none !important;}
  .pane-collapsed>.railexp{display:flex !important;}
  .railexp{display:none;flex-direction:column;align-items:center;gap:var(--sp-12);width:100%;height:100%;padding-top:11px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;}
  .railexp:hover{color:var(--ink);}
  .railexp .rlab{writing-mode:vertical-rl;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;margin-top:6px;}
  /* composition groups */
  /* [R102·D-T2] ESTADO DERIVADO ≠ ESTADO AFIRMADO. Este clip está resaltado porque su GRUPO está seleccionado,
     no porque lo hayas elegido tú. Ableton tiene `ImplicitArm` justo para esto: una pista armada por
     consecuencia de la selección no se ve igual que una que armaste con el ratón.
     Antes iba en `--ink-2` — MÁS brillante que la selección afirmada en standby (`--ink-3`): lo derivado
     gritaba más que lo afirmado. Y ambos usaban la misma forma, así que sólo los separaba el color.
     Ahora la diferencia es de FORMA: **discontinuo = por asociación**. Se lee en escala de grises, con
     cualquier daltonismo, y no compite con el borde macizo de la selección propia. */
  .clip.gsel{outline:1px dashed var(--ink-3);outline-offset:-3px;}
  body.fp-timeline .clip.gsel{outline-color:var(--ink-2);}
  .kindseg{display:flex;flex-wrap:wrap;gap:4px;width:100%;}
  .kindseg button{flex:1 1 28%;min-width:78px;height:18px;padding:0 6px;background:var(--surface-2);border:.5px solid rgba(255,255,255,0.1);border-radius:2px;color:var(--ink-2);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;} /* [U-18] chrome per-button (wrapping grid) — canonical values */
  .kindseg button.on{border-color:var(--ink-2);} /* bg/color from the shared .on rule */
  /* R112 · 360 room setup — habla el idioma del sistema de modales: pozos s0 para lo editable, secciones en
     mayúscula espaciada (como .grphead2), y el color de rol reducido a un punto (saturación = significado). */
  .rs-cv{width:100%;height:212px;display:block;border-radius:3px;border:.5px solid var(--line);background:radial-gradient(140% 155% at 50% 0%,#191B20,#0A0B0D);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);}
  .rs-sec{display:flex;align-items:center;gap:8px;margin:16px 2px 8px;font-size:9.5px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--ink-3);}
  .rs-sec::after{content:'';flex:1;height:.5px;background:var(--line-soft);}
  .rs-sec .rs-note{color:var(--ink-dim);letter-spacing:0.01em;text-transform:none;font-weight:500;font-size:10px;}
  .rs-hdr,.rs-wall{display:grid;grid-template-columns:20px 42px minmax(0,1.2fr) 62px 62px minmax(0,1.3fr);gap:8px;align-items:center;}
  .rs-ordnum{justify-self:center;font-family:'Geist',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:12px;font-weight:600;color:var(--ink-2);} /* [F3] fixed screen-order number */
  .rs-hdr{padding:0 8px 6px;font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-3);}
  .rs-hdr>span:nth-child(n+3){text-align:center;}
  .rs-wall{padding:5px 8px;border-radius:3px;border:.5px solid transparent;transition:background .1s,border-color .1s;}
  .rs-wall:hover,.rs-wall.act{background:rgba(255,255,255,0.04);border-color:var(--line);}
  .rs-dot{width:9px;height:9px;border-radius:50%;justify-self:center;box-shadow:0 0 0 3px rgba(0,0,0,0.4);}
  select.rs-role{width:100%;height:22px;}
  .rs-well{display:flex;align-items:center;height:22px;border-radius:2px;background:var(--s0);border:.5px solid var(--line);box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);overflow:hidden;}
  .rs-well:focus-within{border-color:var(--line-strong);}
  .rs-well input{flex:1;min-width:0;height:100%;border:none;background:transparent;color:var(--ink);text-align:center;font-family:'Geist',system-ui;font-variant-numeric:tabular-nums;font-size:11px;padding:0 3px;}
  .rs-well .u{color:var(--ink-dim);font-size:9px;padding-right:5px;flex-shrink:0;pointer-events:none;}
  .rs-well.rs-ord{width:40px;justify-self:center;}
  .rs-px{display:flex;align-items:center;gap:5px;} .rs-px .rs-well{flex:1;} .rs-px .x{color:var(--ink-dim);font-size:10px;flex-shrink:0;}
  .grpchip{display:flex;align-items:center;gap:8px;margin:8px 12px;padding:8px 10px;border-radius:2px;background:var(--surface);border:.5px solid rgba(255,255,255,0.14);font-size:11px;color:var(--ink-2);cursor:pointer;}
  .grpchip:hover{background:var(--surface-2);} .grpchip .gc{color:var(--ink-2);display:flex;}
  .grprng{flex:1;accent-color:var(--ink-2);}
  /* hover tooltip (shows ~1s after resting on a tool/button) */
  /* [R94-UT2·U-05] persistent automation grammar next to the Automation button — only while automation mode is on */
  .dsp-tip{position:fixed;z-index:90;pointer-events:none;background:var(--s2);color:var(--ink);border:.5px solid rgba(255,255,255,0.14);border-radius:2px;padding:4px 8px;font-size:11px;font-weight:500;letter-spacing:-0.005em;box-shadow:0 6px 20px rgba(0,0,0,0.5);max-width:260px;white-space:normal;line-height:1.4;opacity:0;transition:opacity .1s;} /* [U-28] long tooltips wrap instead of overflowing */
  .dsp-tip.show{opacity:1;}
  /* [R102·D-T4] Info View: nombre + función de lo que hay bajo el puntero. Instantáneo (el tooltip flotante
     tarda 1s y encima tapa). Posición fija = se lee sin buscarla. */
  .statinfo{color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw;}
  .statinfo:not(:empty)::before{content:'·';color:var(--ink-dim);margin:0 var(--sp-8) 0 var(--sp-6);}
  .statinfo .k{color:var(--ink);font-weight:500;}          /* el nombre */
  .statinfo .sc{color:var(--ink-3);margin-left:var(--sp-6);}/* el atajo */
  /* Deshabilitado: ámbar. Es el único momento en que el usuario mira aquí, y por tanto el único momento en que
     de verdad quiere aprender — así que es la superficie donde enseñar el atajo que le falta. */
  .statinfo.why{color:var(--auto-ovr);}
  /* [U-17] native <select>s adopt the .aselect look (chevron data-URI + surface chrome). Placed LAST so it wins ties against the per-class size rules above. */
  .selsel,.qsel,.frow select,select.sysel,.asel{appearance:none;-webkit-appearance:none;height:18px;background-color:var(--surface-2);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%239EA5AD' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 4px center;border:.5px solid rgba(255,255,255,0.1);border-radius:2px;color:var(--ink-2);padding:0 15px 0 7px;cursor:pointer;}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- TOP BAR -->
  <div class="top">
    <span class="dot"></span>
    <div class="menubar" id="menubar">
      <button class="menubtn" data-menu="file" data-t="menuFile">File</button>
      <button class="menubtn" data-menu="edit" data-t="menuEdit">Edit</button>
      <button class="menubtn" data-menu="window" data-t="menuWindow">Window</button>
    </div>
    <span style="font-size:11px;font-weight:600;letter-spacing:-0.008em;color:var(--ink-2);white-space:nowrap;" id="projTitle">Immersive Dome · Show 01</span>
    <span class="tnum" style="font-size:11px;letter-spacing:0.02em;color:var(--ink-faint);cursor:pointer;" id="fmtChip" title="Sequence settings">4096² · 60p · PNG</span>
    <div style="flex:1;"></div>
    <!-- [U5] Undo/Redo buttons removed — Ctrl+Z / Ctrl+Shift+Z only -->
    <div class="seg">
      <button id="newBtn" title="New project · Ctrl+N"><i class="ic" data-ico="plus"></i> New</button>
      <button id="openBtn" title="Open project · Ctrl+O"><i class="ic" data-ico="folder"></i> Open</button>
      <button id="saveBtn" title="Save · Ctrl+S"><i class="ic" data-ico="save"></i> Save</button>
      <button id="saveMenuBtn" title="Save As… / incremental · Ctrl+Shift+S" style="padding:0 6px;"><i class="ic" data-ico="chevDown"></i></button>
      <button id="exportBtn" title="Export · Ctrl+Shift+E"><span style="color:var(--ink-2);display:flex;"><i class="ic" data-ico="share"></i></span> Export</button>
    </div>
    <button class="tbtn" id="helpBtn" title="All commands &amp; shortcuts · F1" style="font-size:13px;font-weight:600;">?</button>
  </div>

  <div class="bodyrow" id="bodyRow"><div class="stagecol" id="stageCol">
  <!-- MIDDLE -->
  <div class="mid">
    <!-- MEDIA -->
    <aside id="mediaPane" style="width:292px;flex-shrink:0;border-right:.5px solid rgba(255,255,255,0.09);">
      <button class="railexp" id="mediaRail" title="Expand media panel"><i class="ic" data-ico="panelL"></i><span class="rlab">Media</span></button>
      <div class="panhead">
        <div class="pantab"><span style="color:var(--ink-3);display:flex;"><i class="ic" data-ico="folder"></i></span><span class="ttl">Media</span><span class="countbadge" id="mediaCount">0</span></div>
        <div style="flex:1;"></div>
        <div style="display:flex;align-items:center;gap:var(--sp-6);">
          <button class="ibtn" id="mediaViewBtn" title="Grid / list view"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg></button>
          <button class="ibtn" id="newFolderBtn" title="New folder"><i class="ic" data-ico="folder"></i></button>
          <button class="ibtn" id="textBtn" title="Add text / title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 6h14"/><path d="M12 6v13"/></svg></button>
          <button class="ibtn" id="shapeBtn" title="Add shape"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="7" width="16" height="10" rx="1.5"/></svg></button>
          <button class="ibtn" id="importBtn" title="Import media" style="color:var(--ink-2);"><i class="ic" data-ico="plus"></i></button>
          <button class="ibtn flat" id="hideMedia" title="Hide panel"><i class="ic" data-ico="panelL"></i></button>
        </div>
      </div>
      <div class="toolrow" style="height:28px;padding:0 8px;gap:var(--sp-8);">
        <div class="filtseg" id="filtSeg">
          <button data-f="all" class="on">All</button>
          <button data-f="video" title="Video"><i class="ic" data-ico="video"></i></button>
          <button data-f="image" title="Image"><i class="ic" data-ico="image"></i></button>
          <button data-f="audio" title="Audio"><i class="ic" data-ico="audio"></i></button>
        </div>
        <div style="width:.5px;height:16px;background:rgba(255,255,255,0.08);flex-shrink:0;"></div>
        <span class="tnum" id="groupLbl" style="display:none;">Group</span>
        <div class="groupseg" id="groupSeg"><button data-g="none" class="on">None</button><button data-g="folder">Folder</button><button data-g="type">Type</button></div>
      </div>
      <div class="toolrow" style="height:28px;padding:0 8px;gap:var(--sp-6);">
        <div class="searchbox" style="flex:1;display:flex;align-items:center;gap:var(--sp-6);min-width:0;">
          <input id="mediaSearch" type="text" placeholder="Search media… (Ctrl+F)" spellcheck="false" style="flex:1;min-width:0;height:19px;background:var(--s0);border:.5px solid rgba(255,255,255,0.09);border-radius:2px;color:var(--ink);font-family:inherit;font-size:11px;padding:0 6px;outline:none;">
          <button class="ibtn" id="mediaSearchClr" title="Clear search" style="display:none;width:18px;height:18px;">✕</button><!-- [U-20] density exception: lives INSIDE the 18px search field (a 22² box would overflow it) -->
        </div>
        <button class="ringbtn" id="adjLayerBtn" title="Create an adjustment layer — its Reactive FX affect everything below it"><i class="ic" data-ico="layers"></i> Adjust</button>
        <button class="ringbtn" id="ringBtn" title="Create composition (ring / grid / random)"><i class="ic" data-ico="ring"></i> Compose</button>
      </div>
      <div class="medialist" id="mediaList"></div>
      <input id="fileInput" type="file" accept="image/*,video/*,audio/*" multiple style="display:none;">
      <input id="projInput" type="file" accept=".rdome,application/json" style="display:none;">
    </aside>
    <div class="gutter" id="gutterL"></div>

    <!-- VIEWPORT -->
    <main>
      <div class="vptool">
        <div class="vseg" id="viewModeSeg">
          <button data-v="2d" class="on"><i class="ic" data-ico="view2d"></i> Dome Master</button><!-- [U-42] industry term; updModeUI relabels it "2D Master" on flat/room sequences -->
          <button data-v="3d"><i class="ic" data-ico="view3d"></i> 3D Preview</button>
        </div>
        <div class="vdiv" id="d3sep" style="display:none;"></div>
        <div class="vseg" id="threeModeSeg" style="display:none;">
          <button data-m="orbit" class="on"><i class="ic" data-ico="orbit"></i> Orbit</button>
          <button data-m="spec"><i class="ic" data-ico="viewer"></i> Viewer</button>
        </div>
        <div class="vdiv"></div>
        <div class="vseg" id="dispSeg">
          <button data-d="grid" class="on"><i class="ic" data-ico="grid"></i> Grid</button>
          <button data-d="safe"><i class="ic" data-ico="safe"></i> Safe</button>
          <button data-d="outline"><i class="ic" data-ico="outline"></i> Outline</button>
          <button data-d="hfade" title="Fade content near the dome horizon (spring line)"><i class="ic" data-ico="cull"></i> Horizon</button>
          <button data-d="checker" title="Checkerboard background — see how the alpha behaves"><i class="ic" data-ico="grid"></i> Alpha</button>
        </div>
        <div class="vdiv"></div>
        <div class="vseg" id="qualitySeg" title="Preview quality (does not affect export)">
          <button data-q="1" class="on">Full</button>
          <button data-q="0.5">½</button>
          <button data-q="0.25">¼</button>
        </div>
        <div class="vseg" id="proxyToggle" title="Viewport uses proxies (faster). Turn off to preview the original clips."><button data-p="proxy" class="on"><i class="ic" data-ico="bolt"></i> Proxy</button></div>
        <div style="flex:1;"></div>
        <div class="vslab" id="azelReadout"><span class="k">AZ <span class="v" id="azR">0°</span></span><span class="k">EL <span class="v" id="elR">35°</span></span></div>
        <div class="vslab" id="fovCtl" style="display:none;"><span class="k">FOV</span><input type="range" min="40" max="160" value="60" id="fovRange" style="width:56px;accent-color:var(--ink-3);"><span class="v" id="fovLbl" style="width:24px;text-align:right;">60</span></div>
        <div class="vslab" id="dollyCtl" style="display:none;"><span class="k">DOLLY</span><input type="range" min="-0.9" max="2.4" step="0.01" value="0.8" id="dollyRange" style="width:54px;accent-color:var(--ink-3);"><span class="v" id="dollyLbl" style="width:24px;text-align:right;">0.8</span></div>
        <div class="vslab" id="distCtl" style="display:none;"><span class="k">DIST</span><input type="range" min="1.2" max="12" step="0.1" value="3" id="distRange" style="width:54px;accent-color:var(--ink-3);"><span class="v" id="distLbl" style="width:24px;text-align:right;">3.0</span></div>
        <div class="vdiv"></div>
        <div class="vseg">
          <button id="vzOut" style="width:25px;padding:0;justify-content:center;"><i class="ic" data-ico="zoomOut"></i></button>
          <button id="vzReset" class="tnum" style="width:42px;padding:0;justify-content:center;font-size:11px;">100%</button>
          <button id="vzIn" style="width:25px;padding:0;justify-content:center;"><i class="ic" data-ico="zoomIn"></i></button>
        </div>
        <div class="vdiv"></div>
        <div class="vseg"><button id="perfBtn" title="Full performance — hide the editor, show only the viewer (Esc to exit)" style="width:26px;padding:0;justify-content:center;"><i class="ic" data-ico="tallpanel"></i></button></div>
        <div class="vseg"><button id="popoutBtn" title="Open a viewer-only window — drag it to a second screen" style="width:26px;padding:0;justify-content:center;"><i class="ic" data-ico="popout"></i></button></div>
        <div class="vseg"><button id="ndiBtn" title="NDI output — broadcast the clean Dome master (1:1) over the network" style="width:26px;padding:0;justify-content:center;"><i class="ic" data-ico="ndi"></i></button></div>
        <div class="vseg"><button id="spoutBtn" title="Spout output — share the clean Dome master (1:1) as a local GPU texture (Resolume / TouchDesigner / OBS)" style="width:26px;padding:0;justify-content:center;font:600 10px Geist,system-ui,sans-serif;letter-spacing:.03em;">SP</button></div>
      </div>
      <div class="stage" id="stage">
